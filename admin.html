<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | House of Noctaire</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">House of Noctaire</a>
    <nav><a href="index.html">Storefront</a><button id="signOutBtn" class="ghost hidden">Sign out</button></nav>
  </header>
  <main class="section admin-wrap">
    <section id="loginPanel" class="panel narrow">
      <p class="eyebrow">Admin</p>
      <h1>Sign in</h1>
      <form id="loginForm">
        <label>Email<input name="email" type="email" required /></label>
        <label>Password<input name="password" type="password" required /></label>
        <button class="button full" type="submit">Sign in</button>
      </form>
      <p id="loginStatus" class="muted"></p>
    </section>

    <section id="adminPanel" class="hidden">
      <div class="section-head">
        <div><p class="eyebrow">Dashboard</p><h1>Products</h1></div>
      </div>
      <form id="productForm" class="panel grid-form">
        <input type="hidden" name="id" />
        <label>Name<input name="name" required /></label>
        <label>Price<input name="price" type="number" step="0.01" min="0" required /></label>
        <label>Category<input name="category" placeholder="Fragrance" /></label>
        <label>Status<select name="status"><option value="active">Active</option><option value="draft">Draft</option><option value="sold_out">Sold out</option></select></label>
        <label>Image URL<input name="image_url" placeholder="https://..." /></label>
        <label>Featured<select name="featured"><option value="false">No</option><option value="true">Yes</option></select></label>
        <label class="wide">Description<textarea name="description"></textarea></label>
        <button class="button" type="submit">Save product</button>
        <button id="resetFormBtn" class="ghost" type="button">New product</button>
      </form>
      <div id="adminProducts" class="admin-list"></div>

      <div class="section-head top-space"><div><p class="eyebrow">Orders</p><h2>Recent orders</h2></div></div>
      <div id="ordersList" class="admin-list"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
